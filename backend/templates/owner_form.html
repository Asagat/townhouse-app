<!DOCTYPE html>
<html>
<head>
    <title>Управление владельцами</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 900px; }
    </style>
</head>
<body class="container mt-5">
    <div class="row">
        <div class="col-md-12 mb-5">
            <h2 class="mb-4">🏠 Регистрация владельца</h2>
            <form action="/owners/form" method="post" class="card p-4 shadow-sm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Полное ФИО</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Имя (коротко)</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Фамилия</label>
                        <input type="text" name="last_name" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" placeholder="+7...">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Сохранить и обновить</button>
            </form>
        </div>

        <div class="col-md-12">
            <h3 class="mb-3">📋 Зарегистрированные владельцы</h3>
            <div class="table-responsive card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>ФИО</th>
                            <th>Телефон</th>
                            <th>Дата создания</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for owner in owners %}
                        <tr>
                            <td>{{ owner.id }}</td>
                            <td><strong>{{ owner.full_name }}</strong></td>
                            <td>{{ owner.phone or '-' }}</td>
                            <td>{{ owner.created_at.strftime('%d.%m.%Y') }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
